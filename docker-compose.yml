services:
  db:
    image: postgres:16-alpine
    container_name: kianprive-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kianprive
    ports:
      - "5432:5432"
    volumes:
      - kianprive-db-data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kianprive-app
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/kianprive?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-secret-change-this
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_BASIC: ${STRIPE_PRICE_BASIC:-price_basic_placeholder}
      STRIPE_PRICE_PREMIUM: ${STRIPE_PRICE_PREMIUM:-price_premium_placeholder}
    ports:
      - "3000:3000"

volumes:
  kianprive-db-data:
